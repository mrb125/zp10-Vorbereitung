<html lang="de">

    <link rel="stylesheet" href="zp10-stationen.css">

<body>
<nav class="sub-nav">
    <div class="sub-nav-inner">
        <a href="../index.html" class="back-btn" aria-label="Zurück zum Hub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>

        <div class="sub-nav-title">
            <span class="sub-nav-emoji">🗺️</span>
            Lernstationen
        </div>
        <div class="sub-nav-actions">
            <button class="icon-btn" id="themeToggle" aria-label="Theme wechseln">🌙</button>
        </div>
    </div>
</nav>

<!-- Landing Page -->
<div id="landingPage" class="landing-container">
    <div class="landing-header">
        <h1>🎯 ZP10 Stationen-Diagnose</h1>
        <p>Laufe durch die Stationen und diagnostiziere deine Stärken!</p>
    </div>

    <div class="student-name-input">
        <input type="text" id="studentNameInput" placeholder="Dein Name hier...">
    </div>

    <div class="stations-grid" id="stationsGrid"></div>
</div>

<!-- Station Page -->
<div id="stationPage" style="display: none;" class="station-container">
    <div class="station-header">
        <div class="station-header-top">
            <div>
                <h2>Station <span id="stationNum"></span></h2>
                <div style="font-size: 1.1rem; color: var(--text-light); margin-top: 4px;">
                    <span id="stationTitle"></span>
                </div>
            </div>
            <div>
                <div class="student-name-display" id="studentNameDisplay"></div>
                <div class="timer" id="timer">00:00</div>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <div class="questions-container" id="questionsContainer"></div>

    <div class="completion-screen" id="completionScreen">
        <div class="completion-animation">✨</div>
        <h3 id="completionTitle"></h3>
        <p style="color: var(--text-light); margin-bottom: 20px;">Großartig! Du hast diese Station abgeschlossen!</p>
        <div class="completion-summary">
            <div class="summary-item">
                <span class="summary-label">Fragen richtig:</span>
                <span class="summary-value" id="summaryCorrect"></span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Punktzahl:</span>
                <span class="summary-value" id="summaryScore"></span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Zeit:</span>
                <span class="summary-value" id="summaryTime"></span>
            </div>
        </div>
        <div class="button-group">
            <button class="btn btn-primary" onclick="goToStation(0)">← Zurück zu Stationen</button>
            <button class="btn btn-secondary" onclick="location.reload()">Neu laden</button>
        </div>
    </div>
</div>

<!-- Results Page -->
<div id="resultsPage" style="display: none;" class="results-container">
    <div class="results-header">
        <h2>🏆 Deine Ergebnisse</h2>
        <p style="color: var(--text-light);">Übersicht aller 8 Stationen</p>
    </div>

    <div class="results-grid" id="resultsGrid"></div>

    <div class="results-analysis" id="resultsAnalysis"></div>

    <div class="button-group">
        <button class="btn btn-primary" onclick="goToStation(0)">← Zurück zur Übersicht</button>
        <button class="btn btn-secondary" onclick="exportResults()">📊 Als CSV exportieren</button>
    </div>
</div>

                {
                    id: 's7q3',
                    topic: 'f(x) = a·b^x',
                    type: 'input',
                    text: 'Exponentialfunktion: f(0) = 5 und Wachstumsfaktor b = 2. Wie groß ist a?',
                    opts: [],
                    answer: '5',
                    fb_ok: '✓ Korrekt! f(x) = a · b^x → f(0) = a · 1 = a = 5.',
                    fb_nok: '✗ Bei x = 0 ist jede Basis hoch 0 gleich 1, also f(0) = a · 1 = a.',
                    denkfehler: 'a ist der Anfangswert (der y-Achsenabschnitt bei x=0).',
                    xp: 10
                },
                {
                    id: 's7q4',
                    topic: 'Verdopplungszeit',
                    type: 'mc',
                    text: 'Wachstum mit Faktor 1,2 pro Jahr. Ungefähr wie oft verdoppelt es sich pro 4 Jahre?',
                    opts: ['0,5-mal', '1-mal', '2-mal', '4-mal'],
                    answer: 1,
                    fb_ok: '✓ Genau! 1,2⁴ ≈ 2,07 (verdoppelt sich ungefähr).',
                    fb_nok: '✗ Verdopplungszeit: Wann ist f(t) = 2 · f(0)?',
                    denkfehler: 'Exponentielles Wachstum ist nicht linear, sondern schneller.',
                    xp: 10
                },
                {
                    id: 's7q5',
                    topic: 'Exponentieller Zerfall',
                    type: 'mc',
                    text: 'Funktion f(x) = 100 · 0,8^x. Was sagt der Faktor 0,8?',
                    opts: ['Wächst um 80%', 'Sinkt um 20%', 'Sinkt um 80%', 'Wächst um 20%'],
                    answer: 1,
                    fb_ok: '✓ Super! Faktor 0,8 = 100% - 20% → Sinkt um 20% pro Periode.',
                    fb_nok: '✗ Faktor < 1 bedeutet Zerfall. 0,8 = 1 - 0,2 → Verlust von 20%.',
                    denkfehler: 'Faktor 0,8 ist nicht 80% Zerfall, sondern 20% Verlust pro Periode.',
                    xp: 10
                }
            ]
        },
        {
            id: 8,
            title: 'Strahlensatz & Muster',
            questions: [
                {
                    id: 's8q1',
                    topic: '1. Strahlensatz',
                    type: 'mc',
                    text: 'Zwei Strahlen, parallel geschnitten. Wenn die erste Strecke 2 cm und die parallele Strecke 4 cm sind, wie heißt der Quotient?',
                    opts: ['1/2', '2', '1/4', '4/2'],
                    answer: 0,
                    fb_ok: '✓ Richtig! Strahlensatz: Die Verhältnisse sind gleich.',
                    fb_nok: '✗ 1. Strahlensatz: SA/SB = SA\'/SB\' (S = Scheitel).',
                    denkfehler: 'Die Reihenfolge bei den Quotienten ist wichtig.',
                    xp: 10
                },
                {
                    id: 's8q2',
                    topic: '2. Strahlensatz',
                    type: 'input',
                    text: 'Zwei Strahlen mit Parallelen. AB = 3 cm, A\'B\' = 6 cm, SA = 2 cm. Wie lang ist SA\'?',
                    opts: [],
                    answer: '4',
                    fb_ok: '✓ Genau! 2. Strahlensatz: SA/AB = SA\'/A\'B\' → SA\' = SA · (A\'B\'/AB) = 2 · 2 = 4.',
                    fb_nok: '✗ 2. Strahlensatz: SA/AB = SA\'/A\'B\'.',
                    denkfehler: 'Achte auf die richtige Zuordnung der Strecken.',
                    xp: 10
                },
                {
                    id: 's8q3',
                    topic: 'Zahlenfolge Regel',
                    type: 'mc',
                    text: 'Reihe: 2, 4, 8, 16, ... Wie heißt die nächste Zahl?',
                    opts: ['24', '32', '20', '18'],
                    answer: 1,
                    fb_ok: '✓ Richtig! Jede Zahl ist doppelt so groß (Faktor 2).',
                    fb_nok: '✗ Erkenne das Muster: Wie hängen die Zahlen zusammen?',
                    denkfehler: 'Dies ist eine geometrische Reihe mit Faktor 2.',
                    xp: 10
                },
                {
                    id: 's8q4',
                    topic: 'Bildmuster Anzahl',
                    type: 'mc',
                    text: 'Bildmuster: 1 Dreieck (Bild 1), 3 Dreiecke (Bild 2), 6 Dreiecke (Bild 3). Wie viele in Bild 4?',
                    opts: ['9', '10', '12', '8'],
                    answer: 1,
                    fb_ok: '✓ Exakt! 1, 3, 6, 10... Dreieckszahlen n·(n+1)/2.',
                    fb_nok: '✗ Unterschiede: +2, +3, +4... (dritte Zahl + 4 = 10).',
                    denkfehler: 'Schau auf die Differenzen zwischen den Zahlen.',
                    xp: 10
                },
                {
                    id: 's8q5',
                    topic: 'Ähnliche Dreiecke',
                    type: 'mc',
                    text: 'Zwei ähnliche Dreiecke: Seiten 3, 4, 5 und Seiten 6, 8, 10. Wie heißt der Skalierungsfaktor?',
                    opts: ['2', '1/2', '3', '1/3'],
                    answer: 0,
                    fb_ok: '✓ Perfekt! 6/3 = 8/4 = 10/5 = 2 (Faktor 2).',
                    fb_nok: '✗ Ähnliche Figuren: Alle Seitenlängen mit dem gleichen Faktor multipliziert.',
                    denkfehler: 'Der Faktor ist der Quotient entsprechender Seitenlängen.',
                    xp: 10
                }
            ]
        }
    ];

    // ===== STATE =====
    let currentStation = null;
    let currentQuestion = null;
    let studentName = '';
    let startTime = null;
    let stationStartTime = null;
    let results = {};

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
        loadStudent();
        const params = new URLSearchParams(window.location.search);
        const station = params.get('station');

        if (station && !isNaN(station) && station >= 1 && station <= 8) {
            goToStation(parseInt(station));
        } else {
            showLanding();
        }
    });

    function loadStudent() {
        studentName = localStorage.getItem('zp10_student_name') || '';
        results = JSON.parse(localStorage.getItem('zp10_results') || '{}');
        document.getElementById('studentNameInput').value = studentName;
    }

    function saveStudent() {
        studentName = document.getElementById('studentNameInput').value.trim();
        if (!studentName) studentName = 'Schüler';
        localStorage.setItem('zp10_student_name', studentName);
    }

    // ===== LANDING PAGE =====
    function showLanding() {
        document.getElementById('landingPage').style.display = 'block';
        document.getElementById('stationPage').style.display = 'none';
        document.getElementById('resultsPage').style.display = 'none';

        const grid = document.getElementById('stationsGrid');
        grid.innerHTML = '';

        stationData.forEach(station => {
            const result = results[`station_${station.id}`];
            const statusClass = !result ? 'not-started' :
                              result.completed ? 'completed' : 'in-progress';
            const statusText = !result ? 'nicht gestartet' :
                              result.completed ? `abgeschlossen (${result.score}%)` : 'in Bearbeitung';

            const card = document.createElement('a');
            card.href = `?station=${station.id}`;
            card.className = 'station-card';
            card.innerHTML = `
                <div>
                    <div class="station-number">S${station.id}</div>
                    <div class="station-title">${station.title}</div>
                </div>
                <div class="station-status status-${statusClass}">${statusText}</div>
            `;
            grid.appendChild(card);
        });
    }

    function goToStation(stationNum) {
        if (stationNum === 0) {
            saveStudent();
            showLanding();
            window.history.pushState({}, '', '?');
            return;
        }

        saveStudent();
        currentStation = stationData[stationNum - 1];
        if (!currentStation) return;

        stationStartTime = Date.now();
        startTimer();

        document.getElementById('landingPage').style.display = 'none';
        document.getElementById('resultsPage').style.display = 'none';
        document.getElementById('stationPage').style.display = 'block';

        document.getElementById('stationNum').textContent = currentStation.id;
        document.getElementById('stationTitle').textContent = currentStation.title;
        document.getElementById('studentNameDisplay').textContent = `👤 ${studentName}`;

        renderQuestions();
        window.history.pushState({}, '', `?station=${currentStation.id}`);
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';

        currentStation.questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-${q.id}`;

            let content = `
                <div class="question-number">Frage ${idx + 1} / 5 • ${q.topic}</div>
                <div class="question-text">${q.text}</div>
            `;

            if (q.type === 'mc') {
                content += '<div class="options">';
                q.opts.forEach((opt, optIdx) => {
                    content += `<button class="option" onclick="answerMC('${q.id}', ${optIdx})">${opt}</button>`;
                });
                content += '</div>';
            } else if (q.type === 'input') {
                content += `
                    <div class="input-answer">
                        <input type="text" id="inp-${q.id}" placeholder="Deine Antwort...">
                        <button onclick="answerInput('${q.id}')">✓</button>
                    </div>
                `;
            }

            content += `<div class="feedback" id="fb-${q.id}"></div>`;

            card.innerHTML = content;
            container.appendChild(card);
        });
    }

    function answerMC(qId, optIdx) {
        const q = currentStation.questions.find(x => x.id === qId);
        const card = document.getElementById(`q-${qId}`);
        const buttons = card.querySelectorAll('.option');

        buttons.forEach(b => b.disabled = true);

        const isCorrect = optIdx === q.answer;
        buttons[optIdx].classList.add(isCorrect ? 'correct' : 'incorrect');
        if (isCorrect && q.answer !== undefined) {
            buttons[q.answer].classList.add('correct');
        }

        showFeedback(qId, isCorrect);
        saveAnswer(qId, optIdx, isCorrect);
        updateProgress();
    }

    function answerInput(qId) {
        const q = currentStation.questions.find(x => x.id === qId);
        const input = document.getElementById(`inp-${qId}`);
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = q.answer.toString().toLowerCase();

        const isCorrect = userAnswer === correctAnswer;
        input.disabled = true;
        showFeedback(qId, isCorrect);
        saveAnswer(qId, userAnswer, isCorrect);
        updateProgress();
    }

    function showFeedback(qId, isCorrect) {
        const q = currentStation.questions.find(x => x.id === qId);
        const card = document.getElementById(`q-${qId}`);
        const fb = document.getElementById(`fb-${qId}`);

        card.classList.add(isCorrect ? 'answered' : 'answered wrong');
        fb.classList.add('show', isCorrect ? 'correct' : 'incorrect');
        fb.innerHTML = `
            <div class="feedback-title">${isCorrect ? '✓ Richtig!' : '✗ Nicht ganz...'}</div>
            <div>${isCorrect ? q.fb_ok : q.fb_nok}</div>
            ${!isCorrect ? `<div style="margin-top: 8px; font-size: 0.85rem; opacity: 0.8;">💡 ${q.denkfehler}</div>` : ''}
        `;
    }

    function saveAnswer(qId, answer, isCorrect) {
        const stationKey = `zp10_station_${currentStation.id}`;
        let stationResult = JSON.parse(localStorage.getItem(stationKey) || '{}');
        if (!stationResult.answers) stationResult.answers = {};
        stationResult.answers[qId] = { answer, correct: isCorrect };
        localStorage.setItem(stationKey, JSON.stringify(stationResult));
    }

    function updateProgress() {
        const stationKey = `zp10_station_${currentStation.id}`;
        let stationResult = JSON.parse(localStorage.getItem(stationKey) || '{}');
        const answers = stationResult.answers || {};
        const progress = (Object.keys(answers).length / currentStation.questions.length) * 100;
        document.getElementById('progressFill').style.width = progress + '%';

        if (progress === 100) {
            completeStation();
        }
    }

    function completeStation() {
        const stationKey = `zp10_station_${currentStation.id}`;
        let stationResult = JSON.parse(localStorage.getItem(stationKey) || '{}');
        const answers = stationResult.answers || {};

        const correct = Object.values(answers).filter(a => a.correct).length;
        const score = Math.round((correct / currentStation.questions.length) * 100);

        stationResult.completed = true;
        stationResult.score = score;
        stationResult.name = studentName;
        stationResult.time = Math.round((Date.now() - stationStartTime) / 1000);
        stationResult.timestamp = new Date().toISOString();

        localStorage.setItem(stationKey, JSON.stringify(stationResult));

        results[`station_${currentStation.id}`] = stationResult;
        localStorage.setItem('zp10_results', JSON.stringify(results));

        // ===== SYNC TO HUB DATA =====
        syncToHub(stationResult, score);

        playConfetti();
        showCompletion(correct, score);
    }

    function syncToHub(stationResult, score) {
        try {
            const hubData = JSON.parse(localStorage.getItem('zp10_hub_data') || '{}');
            if (!hubData.studentName && studentName) hubData.studentName = studentName;
            if (!hubData.totalXP) hubData.totalXP = 0;
            if (!hubData.stationResults) hubData.stationResults = {};

            // Add XP from station
            const xpEarned = stationResult.answers
                ? Object.values(stationResult.answers).filter(a => a.correct).length * 10
                : Math.round(score / 20) * 10;
            hubData.totalXP += xpEarned;

            // Save station result to hub
            hubData.stationResults[`station_${currentStation.id}`] = {
                title: currentStation.title,
                score: score,
                xp: xpEarned,
                time: stationResult.time,
                date: stationResult.timestamp,
                answers: stationResult.answers
            };

            // Update rank based on total XP
            const xp = hubData.totalXP;
            if (xp >= 5000) hubData.rank = 'Mathe-Meister';
            else if (xp >= 3000) hubData.rank = 'Profi';
            else if (xp >= 1500) hubData.rank = 'Fortgeschritten';
            else if (xp >= 500) hubData.rank = 'Aufsteiger';
            else hubData.rank = 'Einsteiger';

            localStorage.setItem('zp10_hub_data', JSON.stringify(hubData));
        } catch (e) {
            console.warn('Hub-Sync fehlgeschlagen:', e);
        }
    }

    function showCompletion(correct, score) {
        document.getElementById('questionsContainer').style.display = 'none';
        document.getElementById('completionScreen').classList.add('show');
        document.getElementById('completionTitle').textContent = `Station ${currentStation.id} geschafft! 🎉`;
        document.getElementById('summaryCorrect').textContent = `${correct}/5`;
        document.getElementById('summaryScore').textContent = `${score}%`;

        const minutes = Math.floor(stationResult.time / 60);
        const seconds = stationResult.time % 60;
        document.getElementById('summaryTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        setInterval(() => {
            if (stationStartTime) {
                const elapsed = Math.floor((Date.now() - stationStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('timer').textContent =
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    function playConfetti() {
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: -10,
                vx: (Math.random() - 0.5) * 8,
                vy: Math.random() * 4 + 3,
                color: ['#5B6CF0', '#FF6B8A', '#10B981'][Math.floor(Math.random() * 3)]
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.y += p.vy;
                p.vy += 0.1;
                if (p.y > canvas.height) particles.splice(i, 1);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 6, 6);
            });
            if (particles.length > 0) requestAnimationFrame(animate);
            else canvas.style.display = 'none';
        }
        animate();
    }

    function exportResults() {
        let csv = 'Station,Punkte,Richtig,Zeit,Bearbeitet am\n';
        for (let i = 1; i <= 8; i++) {
            const r = results[`station_${i}`];
            if (r) {
                csv += `"Station ${i}","${r.score}%","${Object.values(r.answers || {}).filter(a => a.correct).length}/5","${r.time}s","${new Date(r.timestamp).toLocaleString()}"\n`;
            }
        }
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ZP10_Diagnose_${studentName}.csv`;
        a.click();
    }
</script>
<script>
(function(){
    const t = document.getElementById('themeToggle');
    const saved = localStorage.getItem('zp10_theme');
    if (saved === 'dark') document.body.classList.add('dark');
    if (t) t.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('zp10_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        t.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    });
})();
</script>
