name: Deploy to lima-city

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: config.php aus Secrets generieren
        run: |
          cat > api/config.php << 'EOF'
          <?php
          define('DB_HOST', 'localhost');
          define('DB_NAME', '${{ secrets.DB_NAME }}');
          define('DB_USER', '${{ secrets.DB_USER }}');
          define('DB_PASS', '${{ secrets.DB_PASS }}');
          define('API_KEY', '${{ secrets.API_KEY }}');
          define('ALLOWED_ORIGIN', '*');
          date_default_timezone_set('Europe/Berlin');
          EOF

      - name: api-config.js aus Secrets generieren
        run: |
          DEPLOY_TS=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          cat > app/js/api-config.js << JSEOF
          // Auto-generiert beim Deploy — nicht committen — $DEPLOY_TS
          window.ZP10_SERVER_URL = 'https://mrbl.4lima.de/api';
          window.ZP10_API_KEY    = '${{ secrets.API_KEY }}';
          JSEOF

      - name: FTP Deploy API
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: api/
          server-dir: /html/api/
          dangerous-clean-slate: false

      - name: FTP Deploy App
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: app/
          server-dir: /html/app/
          dangerous-clean-slate: false
